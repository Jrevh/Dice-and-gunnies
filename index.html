<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
  <title>Dice Defense - Level 1</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow-x: auto;
    }

    .game-container {
      display: flex;
      gap: 20px;
      background: #2a2a2a;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      max-width: 100vw;
    }

    .game-board {
      border: 2px solid #444;
      border-radius: 5px;
    }

    #gameCanvas {
      max-width: 100%;
      height: auto;
    }

    .game-ui {
      display: flex;
      flex-direction: column;
      gap: 15px;
      min-width: 250px;
    }

    .dice-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .dice {
      width: 60px;
      height: 60px;
      background: #4a4a4a;
      border: 2px solid #666;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      cursor: pointer;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .dice:hover, .dice:active {
      background: #5a5a5a;
      transform: scale(1.05);
    }

    .dice.rolling {
      animation: roll 0.1s infinite;
    }

    @keyframes roll {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .points-display {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      font-size: 14px;
      color: #ccc;
    }

    .turn-display {
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      color: #fff;
    }

    .phase-display {
      text-align: center;
      font-size: 14px;
      color: #aaa;
      padding: 10px;
      background: #333;
      border-radius: 5px;
    }

    .defender-selection {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .defender-card {
      padding: 10px;
      background: #3a3a3a;
      border: 2px solid #555;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 12px;
      text-align: center;
      color: #ccc;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .defender-card:hover, .defender-card:active {
      background: #4a4a4a;
      border-color: #777;
    }

    .defender-card.selected {
      background: #4a7c59;
      border-color: #1fb03d;
      color: #fff;
    }

    .defender-card.disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .action-buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      padding: 12px 20px;
      background: #4a7c59;
      border: none;
      border-radius: 5px;
      color: white;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:hover, .btn:active {
      background: #3a6c49;
    }

    .btn:disabled {
      background: #555;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .overlay.hidden {
      display: none;
    }

    .overlay-content {
      background: #2a2a2a;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      color: white;
      max-width: 90vw;
      margin: 20px;
    }

    .overlay h2 {
      margin: 0 0 15px 0;
      font-size: 28px;
    }

    .overlay p {
      margin: 0 0 10px 0;
      font-size: 16px;
      color: #ccc;
    }

    .overlay.victory h2 {
      color: #4a7c59;
    }

    .overlay.defeated h2 {
      color: #d22b2b;
    }

    /* Mobile Responsive Styles */
    @media (max-width: 768px) {
      body {
        padding: 10px;
      }

      .game-container {
        flex-direction: column;
        gap: 15px;
        padding: 15px;
      }

      .game-ui {
        min-width: auto;
        width: 100%;
      }

      .dice-section {
        flex-direction: row;
        justify-content: space-around;
        align-items: center;
      }

      .dice {
        width: 50px;
        height: 50px;
        font-size: 20px;
      }

      .points-display {
        font-size: 12px;
      }

      .turn-display {
        font-size: 16px;
      }

      .phase-display {
        font-size: 12px;
        padding: 8px;
      }

      .defender-card {
        font-size: 11px;
        padding: 8px;
      }

      .btn {
        font-size: 13px;
        padding: 10px 16px;
      }

      .overlay-content {
        padding: 20px;
        margin: 10px;
      }

      .overlay h2 {
        font-size: 24px;
      }

      .overlay p {
        font-size: 14px;
      }
    }

    @media (max-width: 480px) {
      .game-container {
        padding: 10px;
        gap: 10px;
      }

      .dice {
        width: 45px;
        height: 45px;
        font-size: 18px;
      }

      .points-display {
        font-size: 11px;
      }

      .turn-display {
        font-size: 14px;
      }

      .phase-display {
        font-size: 11px;
        padding: 6px;
      }

      .defender-card {
        font-size: 10px;
        padding: 6px;
      }

      .btn {
        font-size: 12px;
        padding: 8px 12px;
      }

      .overlay-content {
        padding: 15px;
      }

      .overlay h2 {
        font-size: 20px;
      }

      .overlay p {
        font-size: 12px;
      }
    }

    /* Landscape orientation enforcement */
    .orientation-warning {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #1a1a1a;
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 2000;
      flex-direction: column;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .orientation-warning.show {
      display: flex;
    }

    .orientation-warning h2 {
      font-size: 24px;
      margin-bottom: 20px;
      color: #4a7c59;
    }

    .orientation-warning p {
      font-size: 16px;
      margin-bottom: 10px;
      color: #ccc;
    }

    .orientation-warning .rotate-icon {
      font-size: 48px;
      margin-bottom: 20px;
      animation: rotate 2s infinite linear;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(90deg); }
    }

    /* Force landscape on mobile */
    @media screen and (max-height: 500px) and (orientation: portrait) {
      .orientation-warning {
        display: flex !important;
      }
      
      .game-container {
        display: none !important;
      }
    }

    /* Optimize for landscape mobile */
    @media screen and (max-width: 1024px) and (orientation: landscape) {
      body {
        padding: 5px;
      }

      .game-container {
        flex-direction: row;
        gap: 10px;
        padding: 10px;
        max-height: 100vh;
      }

      .game-ui {
        min-width: 200px;
        max-width: 250px;
      }

      .dice-section {
        flex-direction: column;
        align-items: center;
      }

      .dice {
        width: 40px;
        height: 40px;
        font-size: 16px;
      }

      .points-display {
        font-size: 10px;
      }

      .turn-display {
        font-size: 12px;
      }

      .phase-display {
        font-size: 10px;
        padding: 5px;
      }

      .defender-card {
        font-size: 9px;
        padding: 5px;
      }

      .btn {
        font-size: 10px;
        padding: 6px 10px;
      }

      #gameCanvas {
        max-height: 80vh;
        width: auto;
      }
    }
  </style>
</head>
<body>
  <div class="game-container">
    <div class="game-board">
      <canvas id="gameCanvas" width="720" height="400"></canvas>
    </div>
    
    <div class="game-ui">
      <div class="dice-section">
        <div class="dice" id="dice">?</div>
        <div class="points-display">
          <span>Points: <span id="points">0</span></span>
          <span>Bank: <span id="bank">0</span></span>
        </div>
        <button class="btn" id="endTurnBtn" disabled>End Turn</button>
      </div>
      
      <div class="turn-display">
        Turn: <span id="turn">1</span>
      </div>
      
      <div class="phase-display" id="phase">
        Click die to roll
      </div>
      
      <div class="defender-selection" id="defenderSelection">
        <!-- Defender cards will be populated by JavaScript -->
      </div>
      
      <div class="action-buttons">
        <button class="btn" id="restartBtn">Restart Level</button>
      </div>
    </div>
  </div>

  <!-- Game Over Overlay -->
  <div class="overlay hidden" id="gameOverlay">
    <div class="overlay-content">
      <h2 id="overlayTitle">Defeated</h2>
      <p id="overlayMessage">The line did not hold.</p>
      <p id="overlayStats">Reached Turn 1</p>
      <button class="btn" id="overlayBtn">Try Again</button>
    </div>
  </div>

  </div>

  <!-- Orientation Warning for Mobile -->
  <div class="orientation-warning" id="orientationWarning">
    <div class="rotate-icon">📱</div>
    <h2>Please Rotate Your Device</h2>
    <p>This game is best played in landscape mode</p>
    <p>Rotate your device to continue playing</p>
  </div>

  <script>
    // Orientation detection and handling
    function checkOrientation() {
      const warning = document.getElementById('orientationWarning');
      const isPortrait = window.innerHeight > window.innerWidth;
      const isMobile = window.innerWidth <= 1024;
      
      if (isPortrait && isMobile) {
        warning.classList.add('show');
      } else {
        warning.classList.remove('show');
      }
    }

    // Check orientation on load and resize
    window.addEventListener('load', checkOrientation);
    window.addEventListener('resize', checkOrientation);
    window.addEventListener('orientationchange', () => {
      setTimeout(checkOrientation, 100); // Small delay for orientation change
    });

    // Initial check
    checkOrientation();
  </script>
  
  <script src="game.js"></script>
</body>
</html>
